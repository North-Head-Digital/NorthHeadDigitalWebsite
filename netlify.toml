# Netlify deployment configuration for the NorthHead Digital static site.
# Eleventy builds source files from src/ into public/.
#
# Note: settings here OVERRIDE the Netlify UI build settings.

[build]
  command = "npm run build"
  publish = "public"

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
