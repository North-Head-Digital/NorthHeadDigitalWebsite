# Netlify deployment configuration for the NorthHead Digital static site.
# The site is plain HTML/CSS/JS with no build step, so we publish the repo root.
#
# Note: settings here OVERRIDE the Netlify UI build settings. We set an explicit
# no-op command (an empty string is ignored and lets the UI command run instead)
# and publish the repo root so Netlify does not look for a non-existent build
# output directory such as "public" or "dist".

[build]
  # The Netlify project is configured (in the UI) to publish a "public" directory.
  # This site is hand-written static files at the repo root, so the "build" simply
  # assembles them into public/. Publishing "public" satisfies both this config and
  # the UI setting, and the explicit command overrides any leftover UI build command.
  command = "rm -rf public && mkdir -p public && cp -r *.html css js assets public/"
  publish = "public"

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
